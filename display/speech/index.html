<!DOCTYPE html>
<html>
<head>
    <title>ARI UNITN Speech and Dialogue</title>
    <link rel="stylesheet" href="../tools/style/style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module" src="js/main.js"></script>
</head>
<body>
    <div class="main-container">
        <div class="top-left-controls">
            <div class="control-btn" title="Back">
                <i class="fa-solid fa-chevron-left"></i>
            </div> 
    
            <div class="control-btn" title="Home">
                <i class="fa-solid fa-house"></i>
            </div>
    
            <div class="control-btn" title="Volume">
                <i class="fa-solid fa-volume-high"></i>
            </div>
        </div>
        <div class="unitn-logo-container">
            <img src="../tools/assets/unitn_logo.jpg" alt="Logo UNITN" class="unitn-logo">
        </div>

        <div class="menu-header">
            <h1 class="main-title">Speech & Dialogue</h1>
            <p class="sub-title">Selelect an option</p>
        </div>

        <div class="interaction-table">
            <div class="btn-row-item" id="int_1">What is your name?</div>
            <div class="btn-row-item" id="int_2">How are you feeling today?</div>
            <div class="btn-row-item" id="int_3">How is the weather today in Trento?</div>
        </div>
    </div>
</body>
</html>
