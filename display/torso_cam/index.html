<!DOCTYPE html>
<html>
<head>
    <title>ARI UNITN Torso camera</title>
    <link rel="stylesheet" href="../tools/style/style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module" src="js/main.js"></script>
</head>
<body>
    <div class="main-container">
        <div class="top-left-controls">
            <div class="control-btn" title="Back">
                <i class="fa-solid fa-chevron-left"></i>
            </div> 
    
            <div class="control-btn" title="Home">
                <i class="fa-solid fa-house"></i>
            </div>
    
            <div class="control-btn" title="Volume">
                <i class="fa-solid fa-volume-high"></i>
            </div>
        </div>
        <div class="unitn-logo-container">
            <img src="../tools/assets/unitn_logo.jpg" alt="Logo UNITN" class="unitn-logo">
        </div>

        <div class="menu-header">
            <h1 class="main-title">Torso camera</h1>
        </div>

        <div class="camera-stream-wrapper">
            <div class="camera-feed-container" id="video_stream">
                <img src="../tools/assets/unitn_logo.jpg" alt="ARI Camera Feed" class="camera-canvas">
            </div>
        </div>
    </div>
</body>
</html>
