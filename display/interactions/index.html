<!DOCTYPE html>
<html>
<head>
    <title>ARI UNITN Interactions</title>

    <!-- style and fontawesome icons -->
    <link rel="stylesheet" href="../tools/style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- script -->
    <script type="module" src="js/main.js"></script>

</head>
<body>

    <div class="status-bar">

        <div class="status-item" id="status-date">
            <i class="fa-solid fa-calendar-days"></i>
            <span>--/--/--</span>
        </div>

        <div class="status-item" id="status-time">
            <i class="fa-solid fa-clock"></i>
            <span>00:00</span>
        </div>

        <div class="status-item" id="status-battery">
            <i class="fa-solid fa-battery-three-quarters"></i>
            <span id="battery-level">--%</span>
        </div>

    </div>

    <div class="main-container">

        <div class="top-left-controls">

            <div class="control-btn" title="Back">
                <i class="fa-solid fa-chevron-left"></i>
            </div> 
    
            <div class="control-btn" title="Home">
                <i class="fa-solid fa-house"></i>
            </div>
    
            <div class="control-btn" title="Volume">
                <i class="fa-solid fa-volume-high"></i>
            </div>

        </div>

        <div class="unitn-logo-container">
            <img src="../tools/assets/unitn_logo.jpg" alt="Logo UNITN" class="unitn-logo">
        </div>

        <div class="menu-header">

            <h1 class="main-title">
                <i class="fa-solid fa-wand-magic-sparkles" style="margin-right: 20px; color: #990000;"></i>
                Interactions
            </h1>
            <p class="sub-title">What do you want me to do?</p>

        </div>

        <div class="btns-row" id="interactions_menu">

            <div class="btn-ari btn-action" id="present_btn">
                <i class="fa-solid fa-chalkboard-user"></i>
                <div id="present_btn_label" class="btn-label">Present the room</div>
            </div>
            
            <div class="btn-ari btn-action" id="shake_hand_btn">
                <i class="fa-solid fa-handshake"></i>
               <div id="shake_hand_cam_btn_label" class="btn-label">Shake my hand</div>
            </div>

            <div class="btn-ari btn-action" id="speech_btn">
                <i class="fa-solid fa-comments"></i>
                <div id="speech_btn_label" class="btn-label">Speech & Dialogue</div>
            </div>

        </div>
        
    </div>
</body>
</html>
