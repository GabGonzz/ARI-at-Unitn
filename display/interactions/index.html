<!DOCTYPE html>
<html>
<head>
    <title>ARI UNITN Menu</title>
    <link rel="stylesheet" href="style/style.css"> 
</head>
<body>
    <div class="main-container">
        <div class="unitn-logo-container">
            <img src="assets/unitn_logo.jpg" alt="Logo UNITN" class="unitn-logo">
        </div>

        <div class="menu-header">
            <h1 class="main-title">Interactions</h1>
        </div>

        <div class="btns-row" id="interactions_menu">
            <div class="btn-container btn-ari btn-action" id="present_btn">
                <div id="present_btn_label" class="btn-label">Present the room</div>
            </div>
            
            <div class="btn-container btn-ari btn-action" id="shake_hand_btn">
                <div id="shake_hand_cam_btn_label" class="btn-label">Shake my hand</div>
            </div>

            <div class="btn-container btn-ari btn-action" id="question_btn">
                <div id="question_btn_label" class="btn-label">How are you?</div>
            </div>
        </div>
    </div>
</body>
</html>
