<!DOCTYPE html>
<html>
<head>
    <title>ARI UNITN Menu</title>
    <link rel="stylesheet" href="../tools/style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="module" src="js/main.js"></script>
</head>
<body>
    <div class="main-container">
        <div class="top-left-controls">
            <div class="control-btn" title="Volume">
                <i class="fa-solid fa-volume-high"></i>
            </div>
        </div>
        <div class="unitn-logo-container">
            <img src="../tools/assets/unitn_logo.jpg" alt="Logo UNITN" class="unitn-logo">
        </div>

        <div class="menu-header">
            <h1 class="main-title">Main Menu</h1>
        </div>

        <div class="btns-row" id="self_presentation_menu">
            <div class="btn-ari btn-action" id="poi_btn">
                <div id="poi_btn_label" class="btn-label">Points of interest</div>
            </div>
            <div class="btn-ari btn-action" id="front_cam_btn">
                <div id="front_cam_btn_label" class="btn-label">Head camera</div>
            </div>
            <div class="btn-ari btn-action" id="torso_cam_btn">
                <div id="torso_cam_btn_label" class="btn-label">Torso camera</div>
            </div>
            <div class="btn-ari btn-action" id="interactions_btn">
                <div id="interactions_btn_label" class="btn-label">Interactions</div>
            </div>
        </div>
    </div>
</body>
</html>
